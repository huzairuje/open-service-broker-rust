name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rust:
    name: cargo build / test / clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy (default features)
        run: cargo clippy --all-targets -- -D warnings

      - name: cargo clippy (postgres feature)
        run: cargo clippy --all-targets --features postgres -- -D warnings

      - name: cargo test
        run: cargo test --all-targets

  conformance:
    name: OSB conformance smoke test
    runs-on: ubuntu-latest
    needs: rust
    steps:
      - uses: actions/checkout@v4

      - name: Bring up broker + Postgres
        run: docker compose up -d --build

      - name: Wait for broker
        run: |
          for i in {1..30}; do
            if curl -sf -u admin:password \
                -H "X-Broker-API-Version: 2.17" \
                http://localhost:8080/v2/catalog > /dev/null; then
              echo "broker ready"
              exit 0
            fi
            echo "waiting for broker... ($i)"
            sleep 2
          done
          echo "broker did not come up in time"
          docker compose logs broker
          exit 1

      - name: Run conformance script
        run: ./tests/conformance/run.sh

      - name: Dump broker logs on failure
        if: failure()
        run: docker compose logs broker

      - name: Tear down
        if: always()
        run: docker compose down -v
